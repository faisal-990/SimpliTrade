# Local stack for running SimpliTrade against a real Postgres.
#
# Fastest path to test real data flow:
#   1) docker compose up -d db          # just Postgres
#   2) set MARKET_PROVIDER + MARKET_API_KEY in .env
#   3) make seed                        # pulls real quotes/fundamentals into the DB
#   4) make run        (Tower 1)  and  make run-engine   (Tower 2)
#
# Or run everything in containers: docker compose --profile app up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simplitrade
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Lightweight web UI to browse the database at http://localhost:8081
  # (System: PostgreSQL, Server: db, User: postgres, Password: postgres, DB: simplitrade)
  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  # --- optional: run the towers in containers too (profile "app") ---
  # All config comes from .env; we only override HOST (the DB is the "db" service
  # on the compose network, not localhost). restart: unless-stopped keeps both
  # towers alive across crashes and reboots — start once and leave it.
  server:
    profiles: ["app"]
    build: .
    command: ["/app/server"]
    restart: unless-stopped
    env_file: [.env]
    environment:
      HOST: db
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  engine:
    profiles: ["app"]
    build: .
    command: ["/app/engine"]
    restart: unless-stopped
    env_file: [.env]
    environment:
      HOST: db
      # Free-tier-safe live defaults (override in .env if you upgrade the feed).
      ENGINE_TICK_INTERVAL: ${ENGINE_TICK_INTERVAL:-300s}
      MARKET_REFRESH_LIMIT: ${MARKET_REFRESH_LIMIT:-8}
    depends_on:
      db:
        condition: service_healthy

  # One-shot universe seed: docker compose --profile seed run --rm seed
  seed:
    profiles: ["seed"]
    build: .
    command: ["/app/seed"]
    env_file: [.env]
    environment:
      HOST: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
