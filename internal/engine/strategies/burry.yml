schema_version: 2

identity:
  id: burry
  name: "Michael Burry"
  firm: "Scion Asset Management"
  era: "2000–present"
  style: contrarian_deep_value
  philosophy: "Deep-value special situations and contrarian macro bets nobody else will touch."
  enabled: true

profile:
  risk_rating: 8
  volatility: extreme
  time_horizon: medium
  typical_holding_days: 540
  tagline: "It is ludicrous to believe that asset bubbles can only be recognized in hindsight."

universe:
  asset_classes: [equity]
  market_cap_min: 100000000
  market_cap_max: 20000000000
  sectors_include: []
  sectors_exclude: []
  geographies: [US, GLOBAL]
  min_positions: 6
  max_positions: 15

buy:
  gates:
    valuation:
      pe_max: 10
      pb_max: 1.2
      ev_ebitda_max: 6.0
      fcf_yield_min: 0.08
      use_graham_number: true
    financial_safety:
      debt_to_equity_max: 0.8
      net_current_asset_rule: true
  margin_of_safety_min: 0.45
  scoring:
    intrinsic: 0.45
    valuation: 0.45
    stability: 0.10

sell:
  take_profit_vs_intrinsic: 1.0
  stop_loss_pct: null
  thesis_break:
    debt_to_equity_above: 1.5
  max_position_size: 0.20

risk:
  position_sizing: conviction
  max_position_size: 0.20
  cash_buffer_min: 0.15
  rebalance: dynamic
  leverage_max: 1.0
