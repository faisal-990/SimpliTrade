      breakout_required: true
    momentum:
      return_3m_min: 0.15
      relative_strength_min: 80
  margin_of_safety_min: null
  scoring:
    momentum: 0.60
    technical: 0.40

sell:
  take_profit_vs_intrinsic: null
  stop_loss_pct: 0.08
  trailing_stop_pct: 0.12
  thesis_break:
    rsi_below: 45
  max_position_size: 0.30

risk:
  position_sizing: pyramid
  max_position_size: 0.30
  cash_buffer_min: 0.0
  rebalance: dynamic
